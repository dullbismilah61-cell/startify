<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARTIFY</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <img src="logo.png" class="logo">

    <h1>STARTIFY</h1>

    <p class="subtitle">
        Level Up Your Life
    </p>

    <div class="quote">
        "Perubahan besar dimulai dari langkah kecil."
    </div>

    <button id="startBtn">
        🚀 Mulai Mission
    </button>

    <div class="mission-box">

        <h2>📅 Mission Hari Ini</h2>

        <label>
            <input type="checkbox">
            Bangun sebelum jam 07.00
        </label>

        <label>
            <input type="checkbox">
            Minum 2 gelas air
        </label>

        <label>
            <input type="checkbox">
            Jangan buka media sosial 1 jam
        </label>

        <label>
            <input type="checkbox">
            Jalan kaki 15 menit
        </label>

        <label>
            <input type="checkbox">
            Baca 5 halaman buku
        </label>

    </div>

    <div class="progress">

        <div class="progress-bar">

            <div id="bar"></div>

        </div>

        <p id="percent">0% Selesai</p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
